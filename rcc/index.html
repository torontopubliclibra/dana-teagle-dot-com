<body>
  <main class="rcc-page is-locked" id="rcc-page">
    <header class="rcc-page-header">
      <h1>Rusty Cinema Club</h1>
      <h2>An invite-only movie club brought to you by <a href="https://danateagle.com/tpl" target="_blank">Dana 'Rusty'
          Rosamund
          Teagle</a>.</h2>
      <form class="rcc-access-gate" id="rcc-access-gate" autocomplete="off">
        <label for="rcc-password">Enter RCC password</label>
        <div class="rcc-access-controls">
          <input type="password" id="rcc-password" class="rcc-access-input" placeholder="Password" required />
          <button type="submit" class="rcc-access-button">Enter</button>
        </div>
        <p class="rcc-access-message" id="rcc-access-message" aria-live="polite"></p>
      </form>
      <div class="rcc-filter-tabs" role="tablist" aria-label="Browse RCC films by year"></div>
      <label class="rcc-confirmed-toggle" for="rcc-confirmed-toggle">
        <input type="checkbox" id="rcc-confirmed-toggle" checked />
        Only show confirmed screenings
      </label>
    </header>
    <section class="rcc-grid" id="rcc-grid" aria-label="RCC film posters"></section>
    <section class="rcc-stats-accordion" id="rcc-stats" aria-label="RCC statistics"></section>
  </main>
  <div id="rcc-lightbox-root"></div>
  <script src="../scripts/rcc.js"></script>
